<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全自訂成績管理系統-智慧連動版</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f1c40f;
            --light: #ecf0f1;
        }
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 0;
            color: #333;
        }
        header {
            background-color: var(--primary);
            color: white;
            padding: 10px;
            text-align: center;
        }
        header h2 { margin: 5px 0 10px 0; font-size: 20px; }
        
        nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 5px;
        }
        nav button {
            background: none;
            border: 1px solid white;
            color: white;
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 13px;
            transition: 0.2s;
        }
        nav button.active, nav button:hover {
            background-color: white;
            color: var(--primary);
            font-weight: bold;
        }
        
        .container {
            max-width: 800px;
            margin: 10px auto;
            padding: 15px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .page { display: none; }
        .page.active { display: block; }
        
        h2.page-title { 
            border-bottom: 2px solid var(--primary); 
            padding-bottom: 8px; 
            color: var(--primary); 
            font-size: 18px;
            margin-top: 5px;
        }
        h3 { color: var(--secondary); margin: 15px 0 8px 0; font-size: 16px; }
        
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, select { 
            width: 100%; 
            padding: 10px; 
            box-sizing: border-box; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            font-size: 15px;
        }
        
        .subject-input-flow {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #f9f9f9;
            padding: 12px;
            border-radius: 6px;
            border: 1px dashed #ccc;
        }
        .subject-input-flow .row { display: flex; gap: 8px; }
        .subject-input-flow input { flex: 1; }
        
        button.btn {
            background-color: var(--primary); color: white; border: none; 
            padding: 12px 20px; cursor: pointer; border-radius: 4px; 
            font-size: 15px; font-weight: bold; width: 100%; margin-top: 10px;
        }
        button.btn:hover { background-color: var(--secondary); }
        
        button.btn-add-sub {
            background-color: #34495e; color: white; border: none;
            padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer;
        }

        #addedSubjectsList {
            background: #f9f9f9; padding: 10px 15px; border-radius: 4px; 
            font-size: 14px; margin-top: 5px; list-style: none;
        }
        #addedSubjectsList li {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 0; border-bottom: 1px solid #eee;
        }
        #addedSubjectsList li:last-child { border-bottom: none; }
        
        button.btn-delete-sub {
            background-color: var(--danger); color: white; border: none;
            padding: 4px 8px; border-radius: 4px; font-size: 12px; cursor: pointer; font-weight: bold;
        }

        /* 快速輸入區區塊面板 */
        .score-entry-panel {
            background: #edf2f7;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 5px solid var(--primary);
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-top: 10px;
        }
        table { width: 100%; border-collapse: collapse; min-width: 650px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; font-size: 14px; }
        th { background-color: var(--light); color: var(--primary); }
        tr:nth-child(even) { background-color: #f9f9f9; }
        
        .up { color: #d32f2f; font-weight: bold; } 
        .down { color: #388e3c; font-weight: bold; }
        .help-text { font-size: 12px; color: #767676; margin-top: 3px; }
    </style>
</head>
<body>

<header>
    <h2>🏆 成績排行管理系統</h2>
    <nav>
        <button onclick="switchPage('examPage')" id="btn-examPage" class="active">📝 考試設定</button>
        <button onclick="switchPage('examListPage')" id="btn-examListPage">📋 考試列表</button>
        <button onclick="switchPage('studentPage')" id="btn-studentPage">👤 學生管理</button>
        <button onclick="switchPage('scorePage')" id="btn-scorePage">📊 成績總管</button>
    </nav>
</header>

<div class="container">
    
    <div id="examPage" class="page active">
        <h2 class="page-title">創建新考試</h2>
        <h3>Step 1: 輸入考試基本資訊</h3>
        <div class="form-group">
            <label>考試名稱</label>
            <input type="text" id="examName" placeholder="例如：1140202">
        </div>
        <div class="form-group">
            <label>適用科系 (手動輸入，多個請用逗號隔開)</label>
            <input type="text" id="examDepts" placeholder="例如：電子科,資訊科">
        </div>
        <div class="form-group">
            <label>適用班級 (手動輸入，多個請用逗號隔開)</label>
            <input type="text" id="examClasses" placeholder="例如：102,103">
        </div>
        
        <h3>Step 2: 添加考試科目與權重</h3>
        <div class="subject-input-flow">
            <div class="form-group" style="margin-bottom: 5px;">
                <label style="font-size:12px; color:#555;">科目名稱</label>
                <input type="text" id="subName" placeholder="例如：數學">
            </div>
            <div class="row">
                <div style="flex:1;">
                    <label style="font-size:12px; color:#555;">及格分數</label>
                    <input type="number" id="subPass" value="60">
                </div>
                <div style="flex:1;">
                    <label style="font-size:12px; color:#555;">加權倍數</label>
                    <input type="number" id="subWeight" value="1" step="0.1">
                </div>
            </div>
            <button type="button" class="btn-add-sub" onclick="addSubjectRow()">＋ 確認新增此科目</button>
        </div>
        
        <h3>目前已加入此考試的科目：</h3>
        <ul id="addedSubjectsList">
            <li style="color:#aaa; border-bottom:none;">暫未添加科目</li>
        </ul>
        <button class="btn" style="background-color: #27ae60;" onclick="createExam()">💾 儲存並創建此場考試</button>
    </div>

    <div id="examListPage" class="page">
        <h2 class="page-title">已創建的考試列表</h2>
        <div class="table-responsive">
            <table id="examTable">
                <thead>
                    <tr><th>考試名稱</th><th>科目內容</th><th>適用範圍</th></tr>
                </thead>
                <tbody>
                    <tr><td colspan="3" style="color:#aaa;">目前尚無考試資料。</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="studentPage" class="page">
        <h2 class="page-title">學生基本資訊管理</h2>
        <h3>自訂創建學生</h3>
        <div class="form-group"><label>學號</label><input type="text" id="stuId" placeholder="例如：112001"></div>
        <div class="form-group"><label>姓名</label><input type="text" id="stuName" placeholder="例如：張三"></div>
        <div class="form-group"><label>科系 (手動輸入)</label><input type="text" id="stuDept" placeholder="例如：電子科"></div>
        <div class="form-group"><label>班級 (手動輸入)</label><input type="text" id="stuClass" placeholder="例如：102"></div>
        <div class="form-group"><label>座號</label><input type="number" id="stuSeat" placeholder="例如：1"></div>
        <button class="btn" onclick="createStudent()">👤 新增學生至名冊</button>
        
        <h3>學生名冊</h3>
        <div class="table-responsive">
            <table id="studentTable">
                <thead>
                    <tr><th>學號</th><th>姓名</th><th>科系</th><th>班級</th><th>座號</th></tr>
                </thead>
                <tbody>
                    <tr><td colspan="5" style="color:#aaa;">目前名冊內尚無學生</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="scorePage" class="page">
        <h2 class="page-title">成績總管與快速輸入中心</h2>
        
        <div class="score-entry-panel">
            <h3>⚡ 快速學分登記</h3>
            <div class="grid-3">
                <div class="form-group">
                    <label>1. 選擇考試</label>
                    <select id="selExam" onchange="initDeptSelect()"><option value="">--請選擇--</option></select>
                </div>
                <div class="form-group">
                    <label>2. 選擇科別</label>
                    <select id="selDept" onchange="initClassSelect()"><option value="">--請選擇--</option></select>
                </div>
                <div class="form-group">
                    <label>3. 選擇班級</label>
                    <select id="selClass" onchange="initStudentSelect()"><option value="">--請選擇--</option></select>
                </div>
            </div>
            <div class="form-group">
                <label>4. 選擇學生</label>
                <select id="selStudent" onchange="renderSubjectScoreInputs()"><option value="">--請選擇--</option></select>
            </div>
            
            <div id="dynamicScoreFields" style="margin-top: 15px; display: none; background: white; padding: 15px; border-radius: 6px;">
                <h4 style="margin-top: 0; color: var(--primary);">✏️ 請輸入該員分數：</h4>
                <div id="fieldsContainer"></div>
                <button class="btn" style="background-color: #2ecc71; margin-top: 15px;" onclick="saveQuickScores()">💾 寫入並更新動態排行</button>
            </div>
        </div>
        
        <h3>🏆 考試動態排行榜 (<span id="currentExamNameTitle">未選擇考試</span>)</h3>
        <div class="table-responsive">
            <table id="scoreManagerTable">
                <thead>
                    <tr>
                        <th>學號</th><th>姓名</th><th>科系/班級</th>
                        <th>未加權總分</th><th>加權總分</th><th>平均分數</th>
                        <th>校排</th><th>科排</th><th>班排</th>
                        <th>進退步</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="10" style="color:#aaa; text-align:center;">請從上方選單選取一場考試以檢視排行榜。</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
// --- 全域資料庫 ---
let exams = [];     
let students = [];  
let tempSubjects = []; 

function switchPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
    document.getElementById('btn-' + pageId).classList.add('active');
    
    if(pageId === 'scorePage') {
        refreshExamSelect();
    }
}

// --- 考試設定邏輯 ---
function addSubjectRow() {
    const name = document.getElementById('subName').value.trim();
    const pass = parseFloat(document.getElementById('subPass').value);
    const weight = parseFloat(document.getElementById('subWeight').value);
    if(!name || isNaN(pass) || isNaN(weight)) return alert('請完整填寫科目名稱！');
    
    tempSubjects.push({ name, pass, weight });
    document.getElementById('subName').value = '';
    renderTempSubjects();
}

function renderTempSubjects() {
    const listContainer = document.getElementById('addedSubjectsList');
    if(tempSubjects.length === 0) {
        listContainer.innerHTML = '<li style="color:#aaa; border-bottom:none;">暫未添加科目</li>';
        return;
    }
    listContainer.innerHTML = tempSubjects.map((sub, index) => `
        <li>
            <span>📚 ${sub.name} (及格:${sub.pass}分 | 加權:${sub.weight}x)</span>
            <button class="btn-delete-sub" onclick="deleteTempSubject(${index})">❌ 刪除</button>
        </li>
    `).join('');
}

function deleteTempSubject(index) {
    tempSubjects.splice(index, 1);
    renderTempSubjects();
}

function createExam() {
    const name = document.getElementById('examName').value.trim();
    const deptsRaw = document.getElementById('examDepts').value.trim();
    const classesRaw = document.getElementById('examClasses').value.trim();
    
    if(!name || tempSubjects.length === 0 || !deptsRaw || !classesRaw) return alert('請確實填妥所有考試設定欄位！');
    
    const depts = deptsRaw.split(',').map(item => item.trim()).filter(item => item !== '');
    const classes = classesRaw.split(',').map(item => item.trim()).filter(item => item !== '');

    exams.push({ id: 'E' + Date.now(), name, depts, classes, subjects: tempSubjects });
    
    tempSubjects = [];
    document.getElementById('examName').value = '';
    document.getElementById('examDepts').value = '';
    document.getElementById('examClasses').value = '';
    renderTempSubjects();
    updateExamUI();
    alert('考試創建成功！');
}

function updateExamUI() {
    const tbody = document.querySelector('#examTable tbody');
    if(exams.length === 0) {
        tbody.innerHTML = `<tr><td colspan="3" style="color:#aaa;">目前尚無考試資料。</td></tr>`;
        return;
    }
    tbody.innerHTML = exams.map(e => `
        <tr>
            <td><strong>${e.name}</strong></td>
            <td>${e.subjects.map(s => `${s.name}(${s.weight}x)`).join(', ')}</td>
            <td>科系: ${e.depts.join('/')}<br>班級: ${e.classes.join('/')}</td>
        </tr>
    `).join('');
}

// --- 學生創建邏輯 ---
function createStudent() {
    const id = document.getElementById('stuId').value.trim();
    const name = document.getElementById('stuName').value.trim();
    const dept = document.getElementById('stuDept').value.trim();
    const sClass = document.getElementById('stuClass').value.trim();
    const seat = parseInt(document.getElementById('stuSeat').value);
    
    if(!id || !name || !dept || !sClass || isNaN(seat)) return alert('請填妥學生所有欄位！');
    if(students.some(s => s.id === id)) return alert('此學號已存在！');

    students.push({ id, name, dept, class: sClass, seat, scores: {} });
    updateStudentTable();
    
    document.getElementById('stuId').value = '';
    document.getElementById('stuName').value = '';
    document.getElementById('stuDept').value = '';
    document.getElementById('stuClass').value = '';
    document.getElementById('stuSeat').value = '';
    alert('學生新增成功！');
}

function updateStudentTable() {
    const tbody = document.querySelector('#studentTable tbody');
    if(students.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" style="color:#aaa;">目前名冊內尚無學生</td></tr>`;
        return;
    }
    tbody.innerHTML = students.map(s => `
        <tr><td>${s.id}</td><td><strong>${s.name}</strong></td><td>${s.dept}</td><td>${s.class}</td><td>${s.seat}</td></tr>
    `).join('');
}


// --- 核心：成績總管連動四級下拉選單邏輯 ---
function refreshExamSelect() {
    const selExam = document.getElementById('selExam');
    const savedValue = selExam.value;
    selExam.innerHTML = '<option value="">--請選擇考試--</option>' + exams.map(e => `<option value="${e.id}">${e.name}</option>`).join('');
    if(exams.some(e => e.id === savedValue)) {
        selExam.value = savedValue;
    } else {
        initDeptSelect();
    }
}

function initDeptSelect() {
    const examId = document.getElementById('selExam').value;
    const selDept = document.getElementById('selDept');
    document.getElementById('dynamicScoreFields').style.display = 'none';
    
    if(!examId) {
        selDept.innerHTML = '<option value="">--請選擇--</option>';
        initClassSelect();
        refreshScoreBoard();
        return;
    }
    
    const exam = exams.find(e => e.id === examId);
    document.getElementById('currentExamNameTitle').textContent = exam.name;
    
    selDept.innerHTML = '<option value="">--請選擇科別--</option>' + exam.depts.map(d => `<option value="${d}">${d}</option>`).join('');
    initClassSelect();
    refreshScoreBoard();
}

function initClassSelect() {
    const examId = document.getElementById('selExam').value;
    const dept = document.getElementById('selDept').value;
    const selClass = document.getElementById('selClass');
    document.getElementById('dynamicScoreFields').style.display = 'none';
    
    if(!examId || !dept) {
        selClass.innerHTML = '<option value="">--請選擇--</option>';
        initStudentSelect();
        return;
    }
    
    const exam = exams.find(e => e.id === examId);
    selClass.innerHTML = '<option value="">--請選擇班級--</option>' + exam.classes.map(c => `<option value="${c}">${c}</option>`).join('');
    initStudentSelect();
}

function initStudentSelect() {
    const examId = document.getElementById('selExam').value;
    const dept = document.getElementById('selDept').value;
    const sClass = document.getElementById('selClass').value;
    const selStudent = document.getElementById('selStudent');
    document.getElementById('dynamicScoreFields').style.display = 'none';
    
    if(!examId || !dept || !sClass) {
        selStudent.innerHTML = '<option value="">--請選擇--</option>';
        return;
    }
    
    // 撈出同時符合當前所選科系與班級的所有學生
    let matchStudents = students.filter(s => s.dept === dept && s.class === sClass);
    selStudent.innerHTML = '<option value="">--請選擇學生--</option>' + matchStudents.map(s => `<option value="${s.id}">${s.seat}號 - ${s.name}</option>`).join('');
}

// 產生所選學生的科目輸入格子
function renderSubjectScoreInputs() {
    const examId = document.getElementById('selExam').value;
    const studentId = document.getElementById('selStudent').value;
    const panel = document.getElementById('dynamicScoreFields');
    const container = document.getElementById('fieldsContainer');
    
    if(!examId || !studentId) {
        panel.style.display = 'none';
        return;
    }
    
    const exam = exams.find(e => e.id === examId);
    const student = students.find(s => s.id === studentId);
    const currentScores = student.scores[examId] || {};
    
    container.innerHTML = exam.subjects.map(sub => {
        const score = currentScores[sub.name] !== undefined ? currentScores[sub.name] : "";
        return `
            <div style="margin-bottom:8px; display:flex; align-items:center; gap:10px;">
                <span style="width:100px; font-weight:bold; font-size:14px;">${sub.name}:</span>
                <input type="number" class="quick-score-input" data-subname="${sub.name}" value="${score}" max="100" min="0" placeholder="未輸入">
            </div>
        `;
    }).join('');
    
    panel.style.display = 'block';
}

function saveQuickScores() {
    const examId = document.getElementById('selExam').value;
    const studentId = document.getElementById('selStudent').value;
    if(!examId || !studentId) return;
    
    const student = students.find(s => s.id === studentId);
    if(!student.scores[examId]) student.scores[examId] = {};
    
    const inputs = document.querySelectorAll('.quick-score-input');
    inputs.forEach(input => {
        const subName = input.getAttribute('data-subname');
        const val = input.value.trim();
        if(val !== "") {
            student.scores[examId][subName] = parseFloat(val);
        } else {
            delete student.scores[examId][subName];
        }
    });
    
    alert('成績已成功登記！排名板已同步即時計算更新。');
    refreshScoreBoard();
    renderSubjectScoreInputs(); // 更新輸入區狀態
}


// --- 核心演算與排行榜動態更新板 ---
function refreshScoreBoard() {
    const examId = document.getElementById('selExam').value;
    const tbody = document.querySelector('#scoreManagerTable tbody');
    
    if(!examId) {
        tbody.innerHTML = `<tr><td colspan="10" style="color:#aaa; text-align:center;">請從上方選單選取一場考試以檢視排行榜。</td></tr>`;
        document.getElementById('currentExamNameTitle').textContent = "未選擇考試";
        return;
    }
    
    const exam = exams.find(e => e.id === examId);
    let participants = students.filter(s => exam.depts.includes(s.dept) && exam.classes.includes(s.class));
    
    if(participants.length === 0) {
        tbody.innerHTML = `<tr><td colspan="10" style="color:#aaa; text-align:center;">此考試範圍內目前沒有符合的學生資料。</td></tr>`;
        return;
    }

    const examIndex = exams.findIndex(e => e.id === examId);
    const prevExam = examIndex > 0 ? exams[examIndex - 1] : null;

    participants.forEach(s => {
        let originalTotal = 0;
        let weightedTotal = 0;
        let hasScore = false;

        const record = s.scores[examId] || {};
        exam.subjects.forEach(sub => {
            if(record[sub.name] !== undefined) {
                const score = record[sub.name];
                originalTotal += score;
                weightedTotal += score * sub.weight;
                hasScore = true;
            }
        });
        
        s._tempOriginal = hasScore ? originalTotal : 0;
        s._tempWeighted = hasScore ? weightedTotal : 0;
        s._tempAvg = hasScore ? (originalTotal / exam.subjects.length) : 0;
        s._hasScore = hasScore;

        if (prevExam) {
            let prevWeightedTotal = 0;
            let prevHasScore = false;
            const prevRecord = s.scores[prevExam.id] || {};
            prevExam.subjects.forEach(sub => {
                if(prevRecord[sub.name] !== undefined) {
                    prevWeightedTotal += prevRecord[sub.name] * sub.weight;
                    prevHasScore = true;
                }
            });
            s._prevWeighted = prevHasScore ? prevWeightedTotal : null;
        } else {
            s._prevWeighted = null;
        }
    });

    let rankedGroup = participants.filter(p => p._hasScore);
    let unrankedGroup = participants.filter(p => !p._hasScore);

    // 依據加權總分大排
    rankedGroup.sort((a,b) => b._tempWeighted - a._tempWeighted);
    calculateRanks(rankedGroup, 'schoolRank');

    const deptsGroup = groupBy(rankedGroup, 'dept');
    Object.values(deptsGroup).forEach(group => {
        group.sort((a,b) => b._tempWeighted - a._tempWeighted);
        calculateRanks(group, 'deptRank');
    });

    const classGroup = groupBy(rankedGroup, 'class');
    Object.values(classGroup).forEach(group => {
        group.sort((a,b) => b._tempWeighted - a._tempWeighted);
        calculateRanks(group, 'classRank');
    });

    unrankedGroup.forEach(s => {
        s.schoolRank = '-'; s.deptRank = '-'; s.classRank = '-';
    });

    let finalDisplayList = [...rankedGroup, ...unrankedGroup];

    tbody.innerHTML = finalDisplayList.map(s => {
        let progressText = "-";
        if(s._prevWeighted !== null && s._hasScore) {
            const diff = (s._tempWeighted - s._prevWeighted).toFixed(1);
            if(diff > 0) progressText = `<span class="up">▲ +${diff}</span>`;
            else if(diff < 0) progressText = `<span class="down">▼ ${diff}</span>`;
            else progressText = "持平";
        }

        return `
            <tr>
                <td>${s.id}</td>
                <td><strong>${s.name}</strong></td>
                <td>${s.dept}/${s.class}</td>
                <td>${s._hasScore ? s._tempOriginal.toFixed(1) : '-'}</td>
                <td><strong>${s._hasScore ? s._tempWeighted.toFixed(1) : '-'}</strong></td>
                <td>${s._hasScore ? s._tempAvg.toFixed(1) : '-'}</td>
                <td>${s.schoolRank}</td>
                <td>${s.deptRank}</td>
                <td>${s.classRank}</td>
                <td>${progressText}</td>
            </tr>
        `;
    }).join('');
}

function calculateRanks(list, rankKey) {
    for(let i=0; i<list.length; i++) {
        if(i > 0 && list[i]._tempWeighted === list[i-1]._tempWeighted) {
            list[i][rankKey] = list[i-1][rankKey];
        } else {
            list[i][rankKey] = i + 1;
        }
    }
}

function groupBy(array, key) {
    return array.reduce((result, currentValue) => {
        (result[currentValue[key]] = result[currentValue[key]] || []).push(currentValue);
        return result;
    }, {});
}
</script>
