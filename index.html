<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成績計算</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f1c40f;
            --light: #ecf0f1;
        }
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 0;
            color: #333;
        }
        header {
            background-color: var(--primary);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav button {
            background: none;
            border: 1px solid white;
            color: white;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 4px;
            margin-left: 10px;
            transition: 0.3s;
        }
        nav button.active, nav button:hover {
            background-color: white;
            color: var(--primary);
        }
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .page { display: none; }
        .page.active { display: block; }
        
        h2 { border-bottom: 2px solid var(--primary); padding-bottom: 10px; color: var(--primary); }
        h3 { color: var(--secondary); margin-top: 10px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        
        button.btn {
            background-color: var(--primary); color: white; border: none; padding: 10px 20px;
            cursor: pointer; border-radius: 4px; font-size: 16px;
        }
        button.btn:hover { background-color: var(--secondary); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: var(--light); color: var(--primary); }
        tr:nth-child(even) { background-color: #f9f9f9; }
        
        .badge { padding: 3px 8px; border-radius: 4px; color: white; font-size: 12px; display: inline-block; margin: 2px; }
        .bg-success { background-color: var(--success); }
        .bg-danger { background-color: var(--danger); }
        
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content { background: white; padding: 30px; border-radius: 8px; width: 80%; max-width: 700px; max-height: 85vh; overflow-y: auto; }
        .close-btn { float: right; font-size: 24px; cursor: pointer; }
        
        .flex-container { display: flex; gap: 20px; }
        .flex-child { flex: 1; min-width: 0; }
        
        .up { color: #d32f2f; font-weight: bold; } 
        .down { color: #388e3c; font-weight: bold; }
        .help-text { font-size: 12px; color: #666; margin-top: 2px; }
    </style>
</head>
<body>

<header>
    <h2>🏆 全自訂成績管理系統</h2>
    <nav>
        <button onclick="switchPage('examPage')" id="btn-examPage" class="active">考試設定</button>
        <button onclick="switchPage('studentPage')" id="btn-studentPage">學生管理</button>
        <button onclick="switchPage('scorePage')" id="btn-scorePage">成績總管</button>
    </nav>
</header>

<div class="container">
    
    <!-- 1. 考試設定頁面 -->
    <div id="examPage" class="page active">
        <h2>創建與管理考試</h2>
        <div class="flex-container">
            <div class="flex-child" style="border-right: 1px solid #eee; padding-right: 20px;">
                <h3>Step 1: 新增考試基本資訊</h3>
                <div class="form-group">
                    <label>考試名稱</label>
                    <input type="text" id="examName" placeholder="例如：期中考、第二次段考">
                </div>
                <div class="form-group">
                    <label>適用科系 (手動輸入，多個請用逗號隔開)</label>
                    <input type="text" id="examDepts" placeholder="例如：資訊科,商經科,普通科">
                    <div class="help-text">提示：名稱需與學生資料的科系完全一樣才能比對排名</div>
                </div>
                <div class="form-group">
                    <label>適用班級 (手動輸入，多個請用逗號隔開)</label>
                    <input type="text" id="examClasses" placeholder="例如：101,102,忠班,孝班">
                </div>
                
                <h3>Step 2: 添加考試科目與權重</h3>
                <div class="form-group">
                    <div style="display: flex; gap: 5px; margin-bottom: 5px;">
                        <input type="text" id="subName" placeholder="科目 (例: 數學)" style="flex:2;">
                        <input type="number" id="subPass" placeholder="及格" style="flex:1;" value="60">
                        <input type="number" id="subWeight" placeholder="加權" style="flex:1;" value="1" step="0.1">
                        <button type="button" onclick="addSubjectRow()">+ 增科目</button>
                    </div>
                    <ul id="addedSubjectsList" style="background:#f9f9f9; padding: 10px 25px; border-radius:4px;"></ul>
                </div>
                <button class="btn" style="width:100%;" onclick="createExam()">儲存並創建此場考試</button>
            </div>
            
            <div class="flex-child">
                <h3>已創建的考試列表</h3>
                <table id="examTable">
                    <thead>
                        <tr><th>考試名稱</th><th>科目內容</th><th>適用範圍</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 2. 學生管理頁面 -->
    <div id="studentPage" class="page">
        <h2>學生基本資訊管理</h2>
        <div class="flex-container">
            <div class="flex-child" style="border-right: 1px solid #eee; padding-right: 20px;">
                <h3>自訂創建學生</h3>
                <div class="form-group"><label>學號</label><input type="text" id="stuId" placeholder="例如：112001"></div>
                <div class="form-group"><label>姓名</label><input type="text" id="stuName" placeholder="例如：張三"></div>
                <div class="form-group"><label>科系 (手動輸入)</label><input type="text" id="stuDept" placeholder="例如：資訊科"></div>
                <div class="form-group"><label>班級 (手動輸入)</label><input type="text" id="stuClass" placeholder="例如：101"></div>
                <div class="form-group"><label>座號</label><input type="number" id="stuSeat" placeholder="例如：1"></div>
                <button class="btn" onclick="createStudent()">新增學生</button>
            </div>
            <div class="flex-child">
                <h3>學生名冊</h3>
                <table id="studentTable">
                    <thead>
                        <tr><th>學號</th><th>姓名</th><th>科系</th><th>班級</th><th>座號</th><th>操作</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 3. 成績總管頁面 -->
    <div id="scorePage" class="page">
        <h2>成績總管中心</h2>
        <div class="form-group" style="max-width: 400px;">
            <label>請選取要查看的考試：</label>
            <select id="scoreExamSelect" onchange="refreshScoreManager()" style="width: 100%; padding: 8px; font-size:14px; border-radius:4px;"></select>
        </div>
        
        <table id="scoreManagerTable">
            <thead>
                <tr>
                    <th>學號</th><th>姓名</th><th>科系/班級</th>
                    <th>原始總分</th><th>加權總分</th>
                    <th>校排</th><th>科排</th><th>班排</th>
                    <th>進退步(較前次加權)</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<!-- 彈窗 (Modal) -->
<div id="studentModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2 id="modalStudentTitle">學生詳細資訊</h2>
        
        <div id="modalInfoArea"></div>
        <hr>
        <h3>📊 本次考試表現</h3>
        <div id="modalPerformanceArea"></div>
        <hr>
        <h3>✏️ 登記/修改分數</h3>
        <div id="modalScoreEditArea"></div>
        <br>
        <button class="btn" onclick="saveScores()">儲存成績變更</button>
    </div>
</div>

<script>
// --- 資料庫變數 ---
let exams = [];     // 考試陣列
let students = [];  // 學生陣列
let currentEditingStudentId = null;
let tempSubjects = []; // 暫存新增中的科目

// 頁面切換
function switchPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
    document.getElementById('btn-' + pageId).classList.add('active');
    
    if(pageId === 'scorePage') refreshScoreManager();
}

// --- 1. 考試設定邏輯 ---
function addSubjectRow() {
    const name = document.getElementById('subName').value.trim();
    const pass = parseFloat(document.getElementById('subPass').value);
    const weight = parseFloat(document.getElementById('subWeight').value);
    if(!name || isNaN(pass) || isNaN(weight)) return alert('請完整填寫科目名稱、及格與加權！');
    
    tempSubjects.push({ name, pass, weight });
    document.getElementById('subName').value = '';
    
    const li = document.createElement('li');
    li.textContent = `${name} (及格標竿:${pass}分, 加權倍數:${weight}x)`;
    document.getElementById('addedSubjectsList').appendChild(li);
}

function createExam() {
    const name = document.getElementById('examName').value.trim();
    const deptsRaw = document.getElementById('examDepts').value.trim();
    const classesRaw = document.getElementById('examClasses').value.trim();
    
    if(!name) return alert('請填寫考試名稱！');
    if(tempSubjects.length === 0) return alert('請至少為這場考試新增一個科目！');
    if(!deptsRaw || !classesRaw) return alert('請輸入適用的科系與班級範圍！');
    
    // 解析手打並用逗號隔開的科系與班級，自動去除前後空格
    const depts = deptsRaw.split(',').map(item => item.trim()).filter(item => item !== '');
    const classes = classesRaw.split(',').map(item => item.trim()).filter(item => item !== '');

    exams.push({ id: 'E' + Date.now(), name, depts, classes, subjects: tempSubjects });
    
    // 清空暫存與輸入框
    tempSubjects = [];
    document.getElementById('examName').value = '';
    document.getElementById('examDepts').value = '';
    document.getElementById('examClasses').value = '';
    document.getElementById('addedSubjectsList').innerHTML = '';
    
    updateExamUI();
    updateExamSelectOptions();
    alert('考試創建成功！');
}

function updateExamUI() {
    const tbody = document.querySelector('#examTable tbody');
    tbody.innerHTML = exams.map(e => `
        <tr>
            <td><strong>${e.name}</strong></td>
            <td>${e.subjects.map(s => `${s.name}(${s.weight}x)`).join(', ')}</td>
            <td>科系: ${e.depts.join('/')}<br>班級: ${e.classes.join('/')}</td>
        </tr>
    `).join('');
}

function updateExamSelectOptions() {
    const select = document.getElementById('scoreExamSelect');
    select.innerHTML = exams.map(e => `<option value="${e.id}">${e.name}</option>`).join('');
}

// --- 2. 學生自訂創建邏輯 ---
function createStudent() {
    const id = document.getElementById('stuId').value.trim();
    const name = document.getElementById('stuName').value.trim();
    const dept = document.getElementById('stuDept').value.trim();
    const sClass = document.getElementById('stuClass').value.trim();
    const seat = parseInt(document.getElementById('stuSeat').value);
    
    if(!id || !name || !dept || !sClass || isNaN(seat)) return alert('請填妥學生所有欄位！');
    if(students.some(s => s.id === id)) return alert('此學號已存在！');

    students.push({ id, name, dept, class: sClass, seat, scores: {} });
    updateStudentTable();
    
    // 清空欄位方便下一筆輸入
    document.getElementById('stuId').value = '';
    document.getElementById('stuName').value = '';
    document.getElementById('stuDept').value = '';
    document.getElementById('stuClass').value = '';
    document.getElementById('stuSeat').value = '';
}

function updateStudentTable() {
    const tbody = document.querySelector('#studentTable tbody');
    if(students.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" style="color:#999;">目前名冊內尚無學生</td></tr>`;
        return;
    }
    tbody.innerHTML = students.map(s => `
        <tr>
            <td>${s.id}</td>
            <td><strong>${s.name}</strong></td>
            <td>${s.dept}</td>
            <td>${s.class}</td>
            <td>${s.seat}</td>
            <td><button onclick="openStudentModal('${s.id}')">登記/修改成績</button></td>
        </tr>
    `).join('');
}

// --- 3. 核心排名演算核心 (包含手動範圍過濾) ---
function refreshScoreManager() {
    const examId = document.getElementById('scoreExamSelect').value;
    const tbody = document.querySelector('#scoreManagerTable tbody');
    if(!examId) {
        tbody.innerHTML = `<tr><td colspan="9" style="color:#999;">請先至「考試設定」建立一場考試。</td></tr>`;
        return;
    }
    const exam = exams.find(e => e.id === examId);
    
    // 依據手動設定的科系與班級，抓出符合資格的學生
    let participants = students.filter(s => exam.depts.includes(s.dept) && exam.classes.includes(s.class));
    
    if(participants.length === 0) {
        tbody.innerHTML = `<tr><td colspan="9" style="color:#999;">此考試範圍內（${exam.depts.join(',')}/${exam.classes.join(',')}）目前沒有符合的學生。</td></tr>`;
        return;
    }

    // 找出上一次創建的考試（對比進退步）
    const examIndex = exams.findIndex(e => e.id === examId);
    const prevExam = examIndex > 0 ? exams[examIndex - 1] : null;

    // 計算每個人的原始總分、加權總分與前次成績
    participants.forEach(s => {
        let originalTotal = 0;
        let weightedTotal = 0;
        let hasScore = false;

        const record = s.scores[examId] || {};
        exam.subjects.forEach(sub => {
            if(record[sub.name] !== undefined) {
                const score = record[sub.name];
                originalTotal += score;
                weightedTotal += score * sub.weight;
                hasScore = true;
            }
        });
        
        s._tempOriginal = hasScore ? originalTotal : 0;
        s._tempWeighted = hasScore ? weightedTotal : 0;
        s._hasScore = hasScore;

        if (prevExam) {
            let prevWeightedTotal = 0;
            let prevHasScore = false;
            const prevRecord = s.scores[prevExam.id] || {};
            prevExam.subjects.forEach(sub => {
                if(prevRecord[sub.name] !== undefined) {
                    prevWeightedTotal += prevRecord[sub.name] * sub.weight;
                    prevHasScore = true;
                }
            });
            s._prevWeighted = prevHasScore ? prevWeightedTotal : null;
        } else {
            s._prevWeighted = null;
        }
    });

    // 只對「有登記成績」的學生進行排名計算，沒成績的排在最後
    let rankedGroup = participants.filter(p => p._hasScore);
    let unrankedGroup = participants.filter(p => !p._hasScore);

    // 1. 全校排名 (所有適用此考試的學生大排行)
    rankedGroup.sort((a,b) => b._tempWeighted - a._tempWeighted);
    calculateRanks(rankedGroup, 'schoolRank');

    // 2. 科排名 (同科系的分組排行)
    const deptsGroup = groupBy(rankedGroup, 'dept');
    Object.values(deptsGroup).forEach(group => {
        group.sort((a,b) => b._tempWeighted - a._tempWeighted);
        calculateRanks(group, 'deptRank');
    });

    // 3. 班排名 (同班級的分組排行)
    const classGroup = groupBy(rankedGroup, 'class');
    Object.values(classGroup).forEach(group => {
        group.sort((a,b) => b._tempWeighted - a._tempWeighted);
        calculateRanks(group, 'classRank');
    });

    // 沒成績的人名次顯示為 "-"
    unrankedGroup.forEach(s => {
        s.schoolRank = '-'; s.deptRank = '-'; s.classRank = '-';
    });

    // 合併重新渲染至畫面上
    let finalDisplayList = [...rankedGroup, ...unrankedGroup];

    tbody.innerHTML = finalDisplayList.map(s => {
        let progressText = "-";
        if(s._prevWeighted !== null && s._hasScore) {
            const diff = (s._tempWeighted - s._prevWeighted).toFixed(1);
            if(diff > 0) progressText = `<span class="up">▲ +${diff}</span>`;
            else if(diff < 0) progressText = `<span class="down">▼ ${diff}</span>`;
            else progressText = "持平";
        }

        return `
            <tr>
                <td>${s.id}</td>
                <td><a href="#" onclick="openStudentModal('${s.id}')" style="color:var(--primary); font-weight:bold;">${s.name}</a></td>
                <td>${s.dept} / ${s.class}</td>
                <td>${s._hasScore ? s._tempOriginal.toFixed(1) : '-'}</td>
                <td><strong>${s._hasScore ? s._tempWeighted.toFixed(1) : '-'}</strong></td>
                <td>${s.schoolRank}</td>
                <td>${s.deptRank}</td>
                <td>${s.classRank}</td>
                <td>${progressText}</td>
            </tr>
        `;
    }).join('');
}

function calculateRanks(list, rankKey) {
    for(let i=0; i<list.length; i++) {
        if(i > 0 && list[i]._tempWeighted === list[i-1]._tempWeighted) {
            list[i][rankKey] = list[i-1][rankKey];
        } else {
            list[i][rankKey] = i + 1;
        }
    }
}

function groupBy(array, key) {
    return array.reduce((result, currentValue) => {
        (result[currentValue[key]] = result[currentValue[key]] || []).push(currentValue);
        return result;
    }, {});
}

// --- 4. 學生個人資料彈窗與成績登記 ---
function openStudentModal(studentId) {
    currentEditingStudentId = studentId;
    const student = students.find(s => s.id === studentId);
    const examId = document.getElementById('scoreExamSelect').value || exams[0]?.id;
    const exam = exams.find(e => e.id === examId);

    document.getElementById('modalStudentTitle').textContent = `學生檔案管理`;
    
    document.getElementById('modalInfoArea').innerHTML = `
        <p><strong>姓名：</strong>${student.name} (${student.id})</p>
        <p><strong>所屬科系：</strong>${student.dept} &nbsp;&nbsp;|&nbsp;&nbsp; <strong>班級：</strong>${student.class} &nbsp;&nbsp;|&nbsp;&nbsp; <strong>座號：</strong>${student.seat} 號</p>
    `;

    if(!exam) {
        document.getElementById('modalScoreEditArea').innerHTML = "<span style='color:red;'>請先創建至少一場考試。</span>";
        document.getElementById('studentModal').style.display = 'flex';
        return;
    }

    // 分析及格、不及格科目
    const currentScores = student.scores[examId] || {};
    let passList = [];
    let failList = [];
    
    exam.subjects.forEach(sub => {
        const score = currentScores[sub.name];
        if(score !== undefined) {
            const infoText = `${sub.name}: ${score}分 (加權後: ${score * sub.weight})`;
            if(score >= sub.pass) passList.push(`<span class="badge bg-success">${infoText}</span>`);
            else failList.push(`<span class="badge bg-danger">${infoText}</span>`);
        }
    });

    let progressHistoryText = "尚無上一次考試對比數據。";
    if(student._prevWeighted !== null && student._hasScore) {
        const diff = (student._tempWeighted - student._prevWeighted).toFixed(1);
        progressHistoryText = diff > 0 ? 
            `<span class="up">▲ 比上次進步 ${diff} 分 (加權)</span>` : 
            `<span class="down">▼ 比上次退步 ${Math.abs(diff)} 分 (加權)</span>`;
    }

    document.getElementById('modalPerformanceArea').innerHTML = `
        <p><strong>當前考卷：</strong>${exam.name}</p>
        <p><strong>🟢 及格學科：</strong> ${passList.length ? passList.join(' ') : '無'}</p>
        <p><strong>🔴 不及格學科：</strong> ${failList.length ? failList.join(' ') : '無'}</p>
        <p><strong>📈 相比上次：</strong> ${progressHistoryText}</p>
    `;

    // 產生動態編輯分數輸入框
    let editHtml = `<form id="editScoreForm">`;
    exam.subjects.forEach(sub => {
        const score = currentScores[sub.name] !== undefined ? currentScores[sub.name] : "";
        editHtml += `
            <div class="form-group" style="display:flex; align-items:center; gap:10px;">
                <label style="width:120px; margin:0; text-align:right;">${sub.name}:</label>
                <input type="number" name="${sub.name}" value="${score}" max="100" min="0" placeholder="未輸入" style="flex:1;">
                <span style="color:#777; font-size:12px; width:180px;">(及格門檻: ${sub.pass} | 權重: ${sub.weight}x)</span>
            </div>
        `;
    });
    editHtml += `</form>`;
    document.getElementById('modalScoreEditArea').innerHTML = editHtml;

    document.getElementById('studentModal').style.display = 'flex';
}

function saveScores() {
    const student = students.find(s => s.id === currentEditingStudentId);
    const examId = document.getElementById('scoreExamSelect').value || exams[0]?.id;
    
    if(!student || !examId) return;

    const form = document.getElementById('editScoreForm');
    const formData = new FormData(form);
    
    if(!student.scores[examId]) student.scores[examId] = {};

    for (let [subjectName, scoreValue] of formData.entries()) {
        if(scoreValue.trim() !== "") {
            student.scores[examId][subjectName] = parseFloat(scoreValue);
        } else {
            delete student.scores[examId][subjectName]; 
        }
    }

    alert(`${student.name} 的分數已更新成功！`);
    closeModal();
    refreshScoreManager(); 
}

function closeModal() {
    document.getElementById('studentModal').style.display = 'none';
}

// 頁面初次載入清空提示
window.onload = function() {
    updateExamUI();
    updateStudentTable();
    refreshScoreManager();
